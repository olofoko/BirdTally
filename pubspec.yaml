name: bird_tally
description: Offline tally app for birdwatchers — Swedish UI, Artportalen CSV export.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0

  # File system & sharing
  path_provider: ^2.1.3
  share_plus: ^10.0.0

  # Permissions (storage for CSV export)
  permission_handler: ^11.3.1

  # Map picker (OSM WebView)
  webview_flutter: ^4.8.0

  # GPS
  geolocator: ^12.0.0

  # State management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.5.5
  sentry_flutter: ^9.0.0

dev_dependencies:
  sentry_dart_plugin: ^3.2.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/taxa.db

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: olof-astrom-enskild-firma
